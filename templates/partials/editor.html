                    <div id="kb-toolbar" class="kb-toolbar" style="display:none;">
                        <button class="kb-tool-btn" data-action="bold" title="加粗 (Ctrl+B)"><b>B</b></button>
                        <button class="kb-tool-btn" data-action="italic" title="斜体 (Ctrl+I)"><i>I</i></button>
                        <button class="kb-tool-btn" data-action="strikethrough" title="删除线"><s>S</s></button>
                        <span class="kb-tool-sep"></span>
                        <button class="kb-tool-btn" data-action="h1" title="一级标题">H1</button>
                        <button class="kb-tool-btn" data-action="h2" title="二级标题">H2</button>
                        <button class="kb-tool-btn" data-action="h3" title="三级标题">H3</button>

                        <button class="kb-tool-btn" data-action="ol" title="有序列表">1. 列表</button>
                        <button class="kb-tool-btn" data-action="check" title="任务列表">☑ 任务</button>
                        <span class="kb-tool-sep"></span>
                        <button class="kb-tool-btn" data-action="code" title="行内代码">&lt;/&gt;</button>
                        <button class="kb-tool-btn" data-action="codeblock" title="代码块">```</button>
                        <button class="kb-tool-btn" data-action="quote" title="引用">❝ 引用</button>
                        <button class="kb-tool-btn" data-action="link" title="链接 (Ctrl+K)">🔗</button>
                        <button class="kb-tool-btn" data-action="table" title="表格">📊</button>

                        </div>

                        <div id="kb-divider" class="kb-divider" style="display:none;"></div>

                        <div id="kb-preview-split" class="kb-preview-split" style="display:none;"></div>
                    </div>
